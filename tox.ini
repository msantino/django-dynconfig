[tox]
envlist =
    py{310,311,312,313}-django{42,50,51,52}
    lint

[testenv]
deps =
    django42: django~=4.2.0
    django50: django~=5.0.0
    django51: django~=5.1.0
    django52: django~=5.2.0
    pytest>=8.0
    pytest-django>=4.8
    pytest-cov>=5.0
    cryptography>=41.0
commands =
    pytest {posargs:-q}

[testenv:lint]
deps =
    ruff>=0.4
commands =
    ruff check src/ tests/
